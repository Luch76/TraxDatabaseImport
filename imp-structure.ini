# Name of the Database directory locator from which to read dump file
DIRECTORY=DMP
SCHEMAS=ODB

# Name of the dump file(s) to import
DUMPFILE=expdp_traxuat_03042026_%U.dmp

# Write a log file of the import (for later review)
LOGFILE=DMP:import-structure.log

# Refresh status on screen every x seconds
STATUS=60

# Import structure only in step 1
CONTENT=METADATA_ONLY

# Skip grant/link metadata that fails in refresh environments
EXCLUDE=OBJECT_GRANT
EXCLUDE=ROLE_GRANT
EXCLUDE=SYSTEM_GRANT
EXCLUDE=DEFAULT_ROLE
EXCLUDE=DB_LINK

# Remap schema if required
remap_schema=ODB:ODB
remap_schema=JETS:ODB
remap_schema=JETS10:ODB
remap_schema=TRAX:ODB
remap_schema=JETSTAR:ODB
remap_schema=BLUE11:ODB
remap_schema=RED:ODB

# Map export tablespace to import schema
remap_tablespace=SWA_DATA:USERS
remap_tablespace=TRAX_INDEX:USERS
remap_tablespace=USERS_DEV:USERS
remap_tablespace=USERS_PREPROD:USERS
remap_tablespace=USERS_TRAINING:USERS
remap_tablespace=TRAX_DATA:USERS
remap_tablespace=TRAX:USERS
remap_tablespace=AZUL:USERS
remap_tablespace=AZUL_DATA:USERS
remap_tablespace=JETS_DATA:USERS
remap_tablespace=JETS10_DATA:USERS
remap_tablespace=QT_DATA:USERS
remap_tablespace=IFACE:USERS
remap_tablespace=USERS_LOB:USERS
remap_tablespace=WO_TCARD_LOB:USERS
remap_tablespace=USERS_IDX:USERS
remap_tablespace=ODB_TS:USERS